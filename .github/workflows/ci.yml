name: CI

# De §11-muren in CI: een test-gate (build + tests) en een secret-scan.
# Met branch protection op main wordt merge geblokkeerd tot beide groen zijn.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-gate:
    name: Test-gate (build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  secret-scan:
    name: Secret-scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
