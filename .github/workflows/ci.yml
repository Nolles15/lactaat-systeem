name: CI

# De §11-muren in CI: een test-gate (build + tests) en een secret-scan.
# Met branch protection op main wordt merge geblokkeerd tot beide groen zijn.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-gate:
    name: Test-gate (build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  secret-scan:
    name: Secret-scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Installeer gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Scan volledige git-history
        # exit-code 1 bij een gevonden sleutel → merge geblokkeerd (de muur).
        run: gitleaks detect --source . --redact -v --exit-code 1
